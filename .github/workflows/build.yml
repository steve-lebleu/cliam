name: Build
on:
  push:
    branches: [ dev, main, hotfix/*, feature/*, release/* ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Cache dependencies
        uses: actions/cache@d4323d331cad257521dd198ee25639a183d72ee8 # v4.2.0
        with:
          path: '**/node_modules'
          key: bun-modules-${{ hashfiles('**/bun.lockb') }}
      - name: Github checkout
        uses: actions/checkout@v4
      - name: Setup Bun environment
        uses: oven-sh/setup-bun@2b176a6e02983d9ed668db3c687439eb49fe611a # v2.2.0
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install
      - name: Lint
        run: bun run lint
      - name: Build
        run: bun run build
  test:
    runs-on: ubuntu-latest
    env:
      RUNNER: github
      NODE_ENV: dev
    steps:
      - name: Github checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Bun environment
        uses: oven-sh/setup-bun@2b176a6e02983d9ed668db3c687439eb49fe611a # v2.2.0
        with:
          bun-version: latest
      - name: Install NPM dependencies
        run: bun install
      - name: Copy .env + cliamrc files
        run: cp .local.env .env && cp ./test/fixtures/cliamrc.js ./.cliamrc.js
      - name: Execute units tests
        run: bun run ci:test
