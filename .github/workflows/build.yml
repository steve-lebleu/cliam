name: Build
on:
  push:
    branches: [ dev, main, hotfix/*, feature/*, release/* ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: '**/node_modules'
          key: bun-modules-${{ hashfiles('**/bun.lockb') }}
      - name: Github checkout
        uses: actions/checkout@v4
      - name: Setup Bun environment
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install
      - name: Copy .env file
        run: cp .env.local .env
      - name: Copy .cliamrc.js file
        run: cp ./test/fixtures/cliamrc.js ./.cliamrc.js
      - name: Build
        run: bun run build
      - name: Execute units tests
        run: bun run ci:test
      - name: Upload reports artifact
        uses: actions/upload-artifact@v4
        with:
          name: reports-files
          path: |
            reports
          retention-days: 3
      - name: Publish to coveralls.io
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path-to-lcov: ./reports/coverage/lcov.info
