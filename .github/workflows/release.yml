name: Release
on:
  push:
    tags:
      - v*
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      RUNNER: github
      NODE_ENV: dev
    steps:
      - name: Github checkout
        uses: actions/checkout@v4
      - name: Setup Bun environment
        uses: oven-sh/setup-bun@2b176a6e02983d9ed668db3c687439eb49fe611a # v2.2.0
        with:
          bun-version: latest
      - name: Install NPM dependencies
        run: bun install
      - name: Lint
        run: bun run lint
      - name: Build
        run: bun run build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            dist/
            package.json
            LICENSE
            README.md
  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      RUNNER: github
      NODE_ENV: dev
    steps:
      - name: Github checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Bun environment
        uses: oven-sh/setup-bun@2b176a6e02983d9ed668db3c687439eb49fe611a # v2.2.0
        with:
          bun-version: latest
      - name: Install NPM dependencies
        run: bun install
      - name: Copy .env + cliamrc files
        run: cp .local.env .env && cp ./test/fixtures/cliamrc.js ./.cliamrc.js
      - name: Execute units tests
        run: bun run ci:test
      - name: Publish coverage to coveralls.io
        uses: coverallsapp/github-action@648a8eb78e6d50909eff900e4ec85cab4524a45b # v2.3.6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: ./reports/coverage/lcov.info
      - name: Publish coverage to Qlty
        uses: qltysh/qlty-action/coverage@a19242102d17e497f437d7466aa01b528537e899 # v2.2.0
        with:
          token: ${{ secrets.QLTY_COVERAGE_TOKEN }}
          files: ./reports/coverage/lcov.info
  release:
    name: Release on Github
    runs-on: ubuntu-latest
    needs: [ build, test ]
    steps:
      - name: Github checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create release
        uses: konfer-be/action-create-release-from-tag@b689c557664cfc70da514ad757f39d62aef72f1e # v1.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
  publish:
    name: Publish on NPM
    runs-on: ubuntu-latest
    needs: [ release ]
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: .
      - name: Setup node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: '18.19.0'
          registry-url: 'https://registry.npmjs.org'
      - name: Publish package on NPM registery
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
